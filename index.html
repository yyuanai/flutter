<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Flutter — Butterfly Identifier</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#c084fc" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <style>
  /* ══════════════════════════════════════════════════════════
   Flutter — Butterfly Identifier  |  style.css
   Dreamy · Soft · Magical · Nature-Inspired
══════════════════════════════════════════════════════════ */

/* ─── FONTS & RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --lavender:     #c084fc;
  --lavender-lt:  #e9d5ff;
  --pink:         #f9a8d4;
  --pink-lt:      #fce7f3;
  --sky:          #7dd3fc;
  --sky-lt:       #e0f2fe;
  --purple:       #a855f7;
  --purple-dk:    #7c3aed;
  --green:        #86efac;
  --white:        #ffffff;
  --cream:        #fdf4ff;
  --text-dk:      #3b0764;
  --text-md:      #7e22ce;
  --text-lt:      #a78bfa;
  --glass-bg:     rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.8);
  --shadow-soft:  0 8px 32px rgba(168,85,247,0.15);
  --shadow-card:  0 4px 24px rgba(124,58,237,0.12);
  --radius-xl:    24px;
  --radius-lg:    18px;
  --radius-md:    12px;
  --nav-h:        80px;
  --ff-display:   'Playfair Display', Georgia, serif;
  --ff-body:      'Nunito', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--cream);
  font-family: var(--ff-body);
  -webkit-font-smoothing: antialiased;
}

.hidden { display: none !important; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ══════════════════════════════════════════════════════════
   SPLASH SCREEN
══════════════════════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  transition: opacity 0.7s ease, visibility 0.7s ease;
}
#splash.fade-out { opacity: 0; visibility: hidden; }

.splash-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #f5d0fe 0%, #e879f9 30%, #a855f7 60%, #7c3aed 100%);
  animation: splashBgShift 4s ease-in-out infinite alternate;
}
@keyframes splashBgShift {
  0%   { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(20deg); }
}

.splash-butterflies {
  position: absolute; inset: 0; pointer-events: none;
}
.sb {
  position: absolute; font-size: 28px; opacity: 0.4;
  animation: floatRandom 6s ease-in-out infinite;
}
.sb1 { top:10%; left:8%;  animation-delay:0s;    animation-duration:7s; }
.sb2 { top:20%; right:10%;animation-delay:1s;    animation-duration:6s; }
.sb3 { top:60%; left:5%;  animation-delay:2s;    animation-duration:8s; }
.sb4 { top:75%; right:8%; animation-delay:0.5s;  animation-duration:7s; }
.sb5 { top:45%; left:50%; animation-delay:1.5s;  animation-duration:6s; }

@keyframes floatRandom {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-20px) rotate(8deg); }
}

.splash-content {
  position: relative; z-index:1;
  display: flex; flex-direction: column; align-items: center;
  gap: 12px; text-align: center;
  animation: splashIn 0.8s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes splashIn {
  from { transform: scale(0.7) translateY(40px); opacity:0; }
  to   { transform: scale(1) translateY(0); opacity:1; }
}

.splash-logo {
  position: relative; width: 110px; height: 110px;
  display: flex; align-items: center; justify-content: center;
}
.logo-ring {
  position: absolute; inset: 0; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.6);
  animation: pulse-ring 2s ease-in-out infinite;
}
@keyframes pulse-ring {
  0%,100% { transform: scale(1);   opacity:0.7; }
  50%      { transform: scale(1.12);opacity:0.3; }
}
.logo-emoji {
  font-size: 64px; line-height:1;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25));
  animation: logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-8px) rotate(5deg); }
}

.splash-title {
  font-family: var(--ff-display); font-size: 42px; font-weight: 700;
  color: #fff; letter-spacing: 2px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.2);
}
.splash-sub {
  font-size: 14px; color: rgba(255,255,255,0.85); font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
}
.splash-loader { width: 200px; margin-top: 24px; }
.loader-track {
  height: 4px; background: rgba(255,255,255,0.25); border-radius: 99px; overflow: hidden;
}
.loader-fill {
  height: 100%; width: 0%; background: #fff; border-radius: 99px;
  animation: loadFill 2.5s cubic-bezier(.4,0,.2,1) forwards;
}
@keyframes loadFill { to { width: 100%; } }
.loader-text {
  color: rgba(255,255,255,0.75); font-size: 12px; margin-top:8px; text-align:center;
}

/* ══════════════════════════════════════════════════════════
   APP SHELL
══════════════════════════════════════════════════════════ */
#app {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  max-width: 420px; margin: 0 auto;
  background: var(--cream);
  animation: appReveal 0.5s ease both;
}
@keyframes appReveal { from { opacity:0; } to { opacity:1; } }

/* Ambient background orbs */
.ambient-bg {
  position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index:0;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(70px); opacity: 0.35;
  animation: orbDrift 12s ease-in-out infinite;
}
.orb1 { width:280px; height:280px; background:#e879f9; top:-60px; left:-60px; animation-delay:0s; }
.orb2 { width:220px; height:220px; background:#7dd3fc; top:50%; right:-80px; animation-delay:4s; }
.orb3 { width:200px; height:200px; background:#f9a8d4; bottom:-60px; left:30%; animation-delay:8s; }
@keyframes orbDrift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%      { transform: translate(20px,-20px) scale(1.05); }
  66%      { transform: translate(-15px,15px) scale(0.95); }
}

/* Background butterfly decorations */
.bg-butterflies {
  position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bb {
  position: absolute; opacity: 0.12; font-size: 22px;
  animation: bbFly 12s ease-in-out infinite;
}
.bb1  { top:15%; left:5%;   animation-duration:11s; animation-delay:0s; }
.bb2  { top:35%; right:8%;  animation-duration:14s; animation-delay:2s; }
.bb3  { top:55%; left:12%;  animation-duration:10s; animation-delay:5s; }
.bb4  { top:70%; right:15%; animation-duration:13s; animation-delay:1s; }
.bb5  { top:85%; left:40%;  animation-duration:12s; animation-delay:3s; }
.bb6  { top:5%;  right:30%; animation-duration:15s; animation-delay:4s; }
.bb7  { top:90%; left:10%;  animation-duration:9s;  animation-delay:6s; font-size:18px; }
.bb8  { top:50%; right:40%; animation-duration:11s; animation-delay:2s; font-size:18px; }
@keyframes bbFly {
  0%,100% { transform: translate(0,0) scale(1) rotate(-5deg); }
  25%      { transform: translate(15px,-25px) scale(1.1) rotate(5deg); }
  50%      { transform: translate(-10px,-10px) scale(0.95) rotate(-3deg); }
  75%      { transform: translate(10px,-20px) scale(1.05) rotate(8deg); }
}

/* ── PAGES ── */
#pages { position: relative; flex: 1; overflow: hidden; z-index: 1; }

.page {
  position: absolute; inset: 0;
  bottom: var(--nav-h);
  opacity: 0; pointer-events: none;
  transform: translateY(16px);
  transition: opacity 0.35s ease, transform 0.35s cubic-bezier(.34,1.3,.64,1);
  overflow: hidden;
}
.page.active { opacity: 1; pointer-events: all; transform: translateY(0); }

.page-scroll {
  height: 100%; overflow-y: auto; overflow-x: hidden;
  padding: 0 16px 24px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
.page-scroll::-webkit-scrollbar { display: none; }

/* ══════════════════════════════════════════════════════════
   HOME PAGE
══════════════════════════════════════════════════════════ */
.home-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 0 16px;
}
.header-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  padding: 8px 16px; border-radius: 99px;
  font-family: var(--ff-display); font-size: 18px; font-weight: 700;
  color: var(--text-dk);
  box-shadow: var(--shadow-soft);
}
.header-emoji { font-size: 20px; }

/* Hero card */
.hero-card {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #6d28d9 100%);
  border-radius: 28px;
  padding: 28px 24px 28px;
  margin-bottom: 16px;
  box-shadow: 0 12px 40px rgba(124,58,237,0.35);
  display: flex; align-items: center; justify-content: space-between;
  min-height: 180px;
}
.hero-bg-blob {
  position: absolute; width: 200px; height: 200px;
  background: rgba(255,255,255,0.1); border-radius: 50%;
  top: -60px; right: -40px;
}
.hero-text { flex: 1; z-index: 1; }
.hero-eyebrow {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.7); font-weight: 700; margin-bottom: 6px;
}
.hero-title {
  font-family: var(--ff-display); font-size: 32px; line-height: 1.15;
  color: #fff; font-weight: 700; margin-bottom: 10px;
}
.hero-title em { font-style: italic; color: var(--pink); }
.hero-desc {
  font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6; max-width: 190px;
}
.hero-illustration {
  font-size: 80px; z-index: 1; line-height: 1;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
  animation: heroButterfly 4s ease-in-out infinite;
}
@keyframes heroButterfly {
  0%,100% { transform: translateY(0) rotate(-8deg) scale(1); }
  50%      { transform: translateY(-12px) rotate(8deg) scale(1.05); }
}

/* Quick actions */
.quick-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;
}
.qa-btn {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius-xl); padding: 20px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  font-size: 13px; font-weight: 700; color: var(--text-dk);
  box-shadow: var(--shadow-card);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease;
}
.qa-btn:active { transform: scale(0.96); }
.qa-camera:hover { box-shadow: 0 8px 32px rgba(168,85,247,0.25); }
.qa-upload:hover { box-shadow: 0 8px 32px rgba(249,168,212,0.3); }
.qa-icon { font-size: 32px; }

.section-label {
  font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--text-lt); margin-bottom: 12px;
}

.home-history-preview { display: flex; flex-direction: column; gap: 10px; }
.empty-state-sm {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 20px;
  display: flex; align-items: center; gap: 12px;
  color: var(--text-lt); font-size: 13px;
  backdrop-filter: blur(8px);
}
.empty-state-sm span { font-size: 24px; }

.garden-decoration {
  text-align: center; margin-top: 24px; font-size: 22px;
  letter-spacing: 8px; opacity: 0.5;
}

/* ══════════════════════════════════════════════════════════
   PAGE TOPBAR
══════════════════════════════════════════════════════════ */
.page-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 0 16px;
}
.back-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  font-size: 24px; color: var(--purple-dk);
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px);
  transition: transform 0.15s;
}
.back-btn:active { transform: scale(0.9); }
.page-title {
  font-family: var(--ff-display); font-size: 22px; font-weight: 700;
  color: var(--text-dk);
}
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  font-size: 18px; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); transition: transform 0.15s;
}
.icon-btn:active { transform: scale(0.9); }
.icon-btn.danger { color: #ef4444; }

/* ══════════════════════════════════════════════════════════
   CAMERA PAGE
══════════════════════════════════════════════════════════ */
.camera-container { display: flex; flex-direction: column; align-items: center; gap: 12px; }

.camera-frame {
  position: relative; width: 100%; max-width: 360px; aspect-ratio: 1;
  border-radius: 28px; overflow: hidden;
  background: #111; box-shadow: 0 12px 48px rgba(124,58,237,0.3);
}
#camera-video { width:100%; height:100%; object-fit: cover; }

/* Scan animated border */
.scan-border {
  position: absolute; inset: 0; border-radius: 28px;
  border: 2px solid transparent;
  background: linear-gradient(135deg, #c084fc, #f9a8d4, #7dd3fc, #c084fc) border-box;
  -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: destination-out; mask-composite: exclude;
  animation: borderGlow 2s linear infinite;
}
@keyframes borderGlow {
  0%,100% { opacity:0.6; }
  50%      { opacity:1; }
}

/* Corner brackets */
.corner {
  position: absolute; width: 28px; height: 28px;
  border-color: var(--lavender); border-style: solid;
}
.c-tl { top:14px; left:14px;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.c-tr { top:14px; right:14px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.c-bl { bottom:14px; left:14px;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.c-br { bottom:14px; right:14px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

/* Scan line */
.scan-line {
  position: absolute; left: 14px; right: 14px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--lavender), var(--pink), var(--lavender), transparent);
  top: 14px; border-radius: 99px; opacity: 0;
  box-shadow: 0 0 12px rgba(192,132,252,0.8);
}
.scan-line.scanning {
  opacity: 1;
  animation: scanSwipe 1.8s ease-in-out infinite;
}
@keyframes scanSwipe {
  0%   { top:14px; }
  100% { top: calc(100% - 16px); }
}

.camera-hint {
  font-size: 12px; color: var(--text-lt); font-weight: 600;
  letter-spacing: 0.5px;
}

.camera-controls {
  display: flex; align-items: center; justify-content: center;
  gap: 24px; margin: 20px 0;
}
.cam-switch-btn, .cam-torch-btn {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); transition: transform 0.15s;
}
.cam-switch-btn:active, .cam-torch-btn:active { transform: scale(0.9); }

.capture-btn {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--lavender), var(--purple));
  box-shadow: 0 6px 24px rgba(168,85,247,0.5), 0 0 0 6px rgba(192,132,252,0.2);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
}
.capture-btn:active { transform: scale(0.92); box-shadow: 0 2px 12px rgba(168,85,247,0.4); }
.capture-inner {
  width: 64px; height: 64px; border-radius: 50%;
  background: white; display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}

/* ══════════════════════════════════════════════════════════
   UPLOAD PAGE
══════════════════════════════════════════════════════════ */
.upload-zone {
  background: var(--glass-bg); border: 2px dashed var(--lavender);
  backdrop-filter: blur(12px);
  border-radius: var(--radius-xl); padding: 36px 24px;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  margin-bottom: 16px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--purple); background: rgba(192,132,252,0.15);
}
.upload-zone:active { transform: scale(0.99); }
.upload-circle {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg, var(--lavender-lt), var(--pink-lt));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(192,132,252,0.25);
}
.upload-emoji { font-size: 44px; animation: logoFloat 3s ease-in-out infinite; }
.upload-title { font-family: var(--ff-display); font-size: 18px; color: var(--text-dk); }
.upload-hint { font-size: 12px; color: var(--text-lt); }

.upload-preview-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.upload-preview-img {
  width: 100%; max-height: 280px; object-fit: contain;
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-card);
}
.clear-upload-btn {
  font-size: 12px; color: #ef4444; font-weight: 700;
  background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
  padding: 6px 14px; border-radius: 99px;
}

/* ══════════════════════════════════════════════════════════
   RESULT CARD
══════════════════════════════════════════════════════════ */
.result-card {
  background: var(--glass-bg); border: 1.5px solid var(--glass-border);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-radius: 28px; padding: 20px;
  box-shadow: 0 12px 40px rgba(124,58,237,0.15);
  animation: resultSlide 0.4s cubic-bezier(.34,1.3,.64,1) both;
  margin-top: 8px;
}
@keyframes resultSlide {
  from { opacity:0; transform: translateY(20px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.result-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.result-thumb {
  width: 72px; height: 72px; border-radius: 16px; object-fit: cover;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.result-meta { flex: 1; }
.result-label {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--text-lt); font-weight: 700; margin-bottom: 4px;
}
.result-species {
  font-family: var(--ff-display); font-size: 20px; font-weight: 700;
  color: var(--text-dk); line-height: 1.2; margin-bottom: 4px;
}
.result-confidence {
  font-size: 13px; font-weight: 700;
  background: linear-gradient(90deg, var(--purple), var(--lavender));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.progress-wrap { margin-bottom: 14px; }
.progress-label {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--text-lt); margin-bottom: 5px;
}
.progress-track {
  height: 8px; background: rgba(192,132,252,0.15); border-radius: 99px; overflow: hidden;
}
.progress-bar {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--purple), var(--pink));
  transition: width 1s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px rgba(168,85,247,0.5);
}

.top-predictions { margin-bottom: 14px; }
.tp-label {
  font-size: 11px; color: var(--text-lt); font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
}
.tp-item {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.tp-rank {
  width: 20px; height: 20px; border-radius: 50%;
  background: linear-gradient(135deg, var(--lavender), var(--purple));
  color: #fff; font-size: 10px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.tp-name { flex: 1; font-size: 12px; color: var(--text-dk); font-weight: 600; }
.tp-pct  { font-size: 12px; color: var(--text-lt); font-weight: 700; }

.fun-fact-card {
  background: linear-gradient(135deg, rgba(192,132,252,0.15), rgba(249,168,212,0.15));
  border: 1px solid rgba(192,132,252,0.3);
  border-radius: 16px; padding: 14px;
}

<script>
/* ══════════════════════════════════════════════════════════
   Flutter — Butterfly Identifier  |  app.js
   Full TensorFlow.js integration + UI logic
══════════════════════════════════════════════════════════ */

'use strict';

/* ─── STATE ─── */
const State = {
  MODEL_URL:    './trained_model/model.json',
  METADATA_URL: './trained_model/metadata.json',
  model:       null,
  labels:      [],
  stream:      null,
  facingMode:  'environment',
  torchOn:     false,
  currentPage: 'home',
  history:     JSON.parse(localStorage.getItem('bf_history') || '[]'),
};

/* ─── FUN FACTS (fallback per common butterfly names) ─── */
const FUN_FACTS = [
  "Butterflies taste with their feet — they have chemoreceptors on their tarsi!",
  "A group of butterflies is called a 'kaleidoscope' or 'flutter'.",
  "Butterflies can see ultraviolet light patterns invisible to the human eye.",
  "Some butterflies migrate thousands of miles each season.",
  "Butterfly wings are actually transparent — the colours come from tiny reflective scales.",
  "They can only fly if their body temperature is above 29°C.",
  "The largest butterfly wingspan reaches nearly 30 cm in the Queen Alexandra's Birdwing.",
  "Butterflies drink from mud puddles to absorb minerals — a behaviour called 'puddling'.",
  "Most adult butterflies live only 2–4 weeks, though some overwinter for 6–8 months.",
  "Monarch butterflies navigate using both the sun and Earth's magnetic field.",
];

/* ════════════════════════════════════════════════════════
   BOOT — load model + splash dismiss
════════════════════════════════════════════════════════ */
async function boot() {
  try {
    await loadModel();
  } catch (e) {
    console.warn('Model load failed:', e);
    setModelStatus('error');
  }

  // Wait for loader animation then dismiss splash
  await delay(2800);
  dismissSplash();
}

async function loadModel() {
  try {
    // Fetch metadata
    const metaResp = await fetch(State.METADATA_URL);
    if (!metaResp.ok) throw new Error(`Metadata HTTP ${metaResp.status}`);
    const meta = await metaResp.json();
    State.labels = meta.labels || [];
    console.log('✅ Labels loaded:', State.labels);

    // Load model
    State.model = await tf.loadLayersModel(State.MODEL_URL);

    // Warm-up prediction (fixes first-run slowness)
    const dummy = tf.zeros([1, 224, 224, 3]);
    State.model.predict(dummy).dispose();
    dummy.dispose();

    console.log('✅ Model loaded successfully');
    setModelStatus('ready');
    showToast('🦋 AI model ready!');
  } catch (e) {
    console.warn('Model load failed:', e);
    setModelStatus('error');
    showToast('⚠️ Demo mode — no model found');
    State.model = null;
    if (State.labels.length === 0) State.labels = generateFallbackLabels();
  }
}

function generateFallbackLabels() {
  return [
    'Monarch', 'Blue Morpho', 'Painted Lady', 'Swallowtail',
    'Red Admiral', 'Cabbage White', 'Common Brimstone',
    'Peacock', 'Small Tortoiseshell', 'Orange-tip',
    'Purple Emperor', 'Clouded Yellow', 'Comma',
    'Grayling', 'Marbled White', 'Meadow Brown',
  ];
}

function dismissSplash() {
  const splash = document.getElementById('splash');
  const app    = document.getElementById('app');
  splash.classList.add('fade-out');
  app.classList.remove('hidden');
  setTimeout(() => splash.style.display = 'none', 700);
  renderHomeHistory();
}

/* ════════════════════════════════════════════════════════
   PREDICTION ENGINE
════════════════════════════════════════════════════════ */
async function predict(imageEl) {
  if (!State.model) return demoPredict();

  return tf.tidy(() => {
    const tensor = tf.browser.fromPixels(imageEl)
      .resizeBilinear([224, 224])
      .toFloat()
      .div(127.5)   // ← your FlowerKnows uses div(127.5).sub(1), not div(255)
      .sub(1)
      .expandDims(0);

    const output = State.model.predict(tensor);
    const scores = Array.from(output.dataSync());
    return buildTopK(scores, 3);
  });
}

function demoPredict() {
  // Simulate predictions for demo/test
  const n = State.labels.length;
  let scores = Array.from({ length: n }, () => Math.random());
  const sum = scores.reduce((a, b) => a + b, 0);
  scores = scores.map(s => s / sum);
  return buildTopK(scores, 3);
}

function buildTopK(scores, k) {
  const indexed = scores.map((s, i) => ({ score: s, label: State.labels[i] || `Species ${i + 1}` }));
  indexed.sort((a, b) => b.score - a.score);
  return indexed.slice(0, k);
}

/* ════════════════════════════════════════════════════════
   CAMERA PAGE
════════════════════════════════════════════════════════ */
async function startCamera() {
  stopCamera();
  const video = document.getElementById('camera-video');
  try {
    State.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: State.facingMode, width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false,
    });
    video.srcObject = State.stream;
  } catch (e) {
    showToast('📷 Camera access denied');
    console.error(e);
  }
}

function stopCamera() {
  if (State.stream) {
    State.stream.getTracks().forEach(t => t.stop());
    State.stream = null;
  }
}

async function captureAndPredict() {
  const video  = document.getElementById('camera-video');
  const canvas = document.getElementById('camera-canvas');
  if (!video.srcObject) { showToast('📷 Start camera first'); return; }

  // Start scan animation
  const scanLine = document.getElementById('scan-line');
  scanLine.classList.add('scanning');

  // Show analyzing overlay on camera frame
  const frame = document.querySelector('.camera-frame');
  const overlay = showAnalyzingOverlay(frame);

  // Draw frame to canvas
  canvas.width  = video.videoWidth  || 224;
  canvas.height = video.videoHeight || 224;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const dataURL = canvas.toDataURL('image/jpeg', 0.9);

  // Create temp image for TF
  const img = new Image();
  img.src = dataURL;
  await new Promise(r => { img.onload = r; });

  const results = await predict(img);

  scanLine.classList.remove('scanning');
  removeAnalyzingOverlay(overlay);

  renderResult('camera-result', dataURL, results);
}

document.getElementById('cam-switch-btn').addEventListener('click', () => {
  State.facingMode = State.facingMode === 'environment' ? 'user' : 'environment';
  if (State.stream) startCamera();
});

document.getElementById('cam-torch-btn').addEventListener('click', async () => {
  if (!State.stream) return;
  const track = State.stream.getVideoTracks()[0];
  if (!track) return;
  State.torchOn = !State.torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: State.torchOn }] });
    document.getElementById('cam-torch-btn').style.opacity = State.torchOn ? '0.5' : '1';
  } catch (_) {
    showToast('Torch not available');
  }
});

document.getElementById('capture-btn').addEventListener('click', captureAndPredict);

/* ════════════════════════════════════════════════════════
   UPLOAD PAGE
════════════════════════════════════════════════════════ */
const uploadZone  = document.getElementById('upload-zone');
const fileInput   = document.getElementById('file-input');
const previewWrap = document.getElementById('upload-preview-wrap');
const previewImg  = document.getElementById('upload-preview');

uploadZone.addEventListener('click', () => fileInput.click());

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

fileInput.addEventListener('change', (e) => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

document.getElementById('clear-upload-btn').addEventListener('click', () => {
  fileInput.value = '';
  previewWrap.classList.add('hidden');
  uploadZone.classList.remove('hidden');
  document.getElementById('upload-result').classList.add('hidden');
});

async function handleFile(file) {
  if (!file.type.startsWith('image/')) { showToast('⚠️ Please select an image'); return; }

  const url = URL.createObjectURL(file);
  previewImg.src = url;
  previewWrap.classList.remove('hidden');
  uploadZone.classList.add('hidden');

  // Wait for image to load
  await new Promise(r => { previewImg.onload = r; });

  // Show overlay
  const overlay = showAnalyzingOverlay(previewWrap);
  const results = await predict(previewImg);
  removeAnalyzingOverlay(overlay);

  renderResult('upload-result', previewImg.src, results);
}

/* ════════════════════════════════════════════════════════
   RESULT CARD RENDERER
════════════════════════════════════════════════════════ */
function renderResult(containerId, imageURL, results) {
  const container = document.getElementById(containerId);
  container.classList.remove('hidden');

  const top    = results[0];
  const pct    = (top.score * 100).toFixed(1);
  const fact   = FUN_FACTS[Math.floor(Math.random() * FUN_FACTS.length)];
  const saveId = `save_${Date.now()}`;

  container.innerHTML = `
    <div class="result-top">
      <img class="result-thumb" src="${imageURL}" alt="${top.label}" />
      <div class="result-meta">
        <div class="result-label">🦋 Identified Species</div>
        <div class="result-species">${top.label}</div>
        <div class="result-confidence">${pct}% confidence</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Confidence</span><span>${pct}%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="pb_${saveId}" style="width:0%"></div>
      </div>
    </div>

    ${results.length > 1 ? `
    <div class="top-predictions">
      <div class="tp-label">Top Predictions</div>
      ${results.map((r, i) => `
        <div class="tp-item">
          <div class="tp-rank">${i + 1}</div>
          <div class="tp-name">${r.label}</div>
          <div class="tp-pct">${(r.score * 100).toFixed(1)}%</div>
        </div>
      `).join('')}
    </div>
    ` : ''}

    <div class="fun-fact-card">
      <div class="ff-header">
        <span class="ff-icon">✨</span>
        <span class="ff-title">Butterfly Fact</span>
      </div>
      <p class="ff-text">${fact}</p>
    </div>

    <button class="save-btn" id="${saveId}" onclick="saveToHistory('${saveId}', \`${encodeURIComponent(imageURL)}\`, \`${encodeURIComponent(top.label)}\`, '${pct}')">
      🌸 Save to My Garden
    </button>
  `;

  // Animate progress bar
  requestAnimationFrame(() => {
    setTimeout(() => {
      const bar = document.getElementById(`pb_${saveId}`);
      if (bar) bar.style.width = `${pct}%`;
    }, 100);
  });

  container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ════════════════════════════════════════════════════════
   HISTORY
════════════════════════════════════════════════════════ */
function saveToHistory(btnId, encodedURL, encodedSpecies, pct) {
  const btn     = document.getElementById(btnId);
  const imageURL = decodeURIComponent(encodedURL);
  const species  = decodeURIComponent(encodedSpecies);

  // Save as small thumbnail
  const canvas = document.createElement('canvas');
  canvas.width = 100; canvas.height = 100;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = imageURL;
  img.onload = () => {
    ctx.drawImage(img, 0, 0, 100, 100);
    const thumb = canvas.toDataURL('image/jpeg', 0.6);
    const entry = {
      id:      Date.now(),
      thumb,
      species,
      pct,
      date:    new Date().toLocaleString(),
    };
    State.history.unshift(entry);
    if (State.history.length > 50) State.history.pop();
    localStorage.setItem('bf_history', JSON.stringify(State.history));
    showToast('🌸 Saved to your garden!');
    if (btn) { btn.textContent = '✅ Saved!'; btn.disabled = true; }
    renderHistoryPage();
    renderHomeHistory();
  };
  img.onerror = () => {
    // No canvas thumb available, save without
    const entry = { id: Date.now(), thumb: null, species, pct, date: new Date().toLocaleString() };
    State.history.unshift(entry);
    localStorage.setItem('bf_history', JSON.stringify(State.history));
    showToast('🌸 Saved to your garden!');
    if (btn) { btn.textContent = '✅ Saved!'; btn.disabled = true; }
    renderHistoryPage();
    renderHomeHistory();
  };
}

function renderHistoryPage() {
  const list = document.getElementById('history-list');
  if (State.history.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">🌿</div>
        <h3>Your garden is empty</h3>
        <p>Identified butterflies will appear here</p>
        <button class="cta-btn" onclick="navigateTo('camera')">Start Scanning</button>
      </div>`;
    return;
  }

  list.innerHTML = State.history.map(item => `
    <div class="history-item" id="hi_${item.id}">
      ${item.thumb
        ? `<img class="hi-thumb" src="${item.thumb}" alt="${item.species}" />`
        : `<div class="hi-thumb" style="background:linear-gradient(135deg,#e9d5ff,#fce7f3);display:flex;align-items:center;justify-content:center;font-size:24px;">🦋</div>`
      }
      <div class="hi-info">
        <div class="hi-species">${item.species}</div>
        <div class="hi-confidence">${item.pct}% confident</div>
        <div class="hi-date">📅 ${item.date}</div>
      </div>
      <button class="hi-delete" onclick="deleteHistoryItem(${item.id})">🗑️</button>
    </div>
  `).join('');
}

function deleteHistoryItem(id) {
  State.history = State.history.filter(h => h.id !== id);
  localStorage.setItem('bf_history', JSON.stringify(State.history));
  const el = document.getElementById(`hi_${id}`);
  if (el) { el.style.opacity = '0'; el.style.transform = 'scale(0.9)'; el.style.transition = '0.25s'; setTimeout(() => renderHistoryPage(), 250); }
  renderHomeHistory();
}

document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (State.history.length === 0) return;
  if (!confirm('Clear all scans from your garden?')) return;
  State.history = [];
  localStorage.removeItem('bf_history');
  renderHistoryPage();
  renderHomeHistory();
  showToast('🌿 Garden cleared');
});

function renderHomeHistory() {
  const wrap = document.getElementById('home-history-preview');
  if (State.history.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state-sm">
        <span>🌿</span><p>No scans yet — go explore!</p>
      </div>`;
    return;
  }
  wrap.innerHTML = State.history.slice(0, 3).map(item => `
    <div class="home-hi-card">
      ${item.thumb
        ? `<img class="home-hi-thumb" src="${item.thumb}" alt="${item.species}" />`
        : `<div class="home-hi-thumb" style="background:linear-gradient(135deg,#e9d5ff,#fce7f3);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;width:48px;height:48px;">🦋</div>`
      }
      <div>
        <div class="home-hi-name">${item.species}</div>
        <div class="home-hi-pct">${item.pct}% · ${item.date}</div>
      </div>
    </div>
  `).join('');
}

/* ════════════════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════════════════ */
function navigateTo(page) {
  if (page === State.currentPage) return;

  // Stop camera when leaving camera page
  if (State.currentPage === 'camera') stopCamera();

  // Deactivate current page
  document.getElementById(`page-${State.currentPage}`).classList.remove('active');
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

  State.currentPage = page;

  // Activate new page
  document.getElementById(`page-${page}`).classList.add('active');
  const navBtn = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (navBtn) navBtn.classList.add('active');

  // Page-specific init
  if (page === 'camera') startCamera();
  if (page === 'history') renderHistoryPage();
}

// Nav dock buttons
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => navigateTo(btn.dataset.page));
});

/* ════════════════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════════════════ */
function setModelStatus(status) {
  const dot = document.getElementById('model-dot');
  dot.className = `status-dot ${status}`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.classList.add('hidden'), 300);
  }, 2500);
}

function showAnalyzingOverlay(parent) {
  const overlay = document.createElement('div');
  overlay.className = 'analyzing-overlay';
  overlay.innerHTML = `
    <div class="analyzing-spinner">🦋</div>
    <div class="analyzing-text">Identifying species…</div>
  `;
  parent.style.position = 'relative';
  parent.appendChild(overlay);
  return overlay;
}

function removeAnalyzingOverlay(overlay) {
  if (overlay && overlay.parentNode) {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.2s';
    setTimeout(() => overlay.remove(), 200);
  }
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
boot();

    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW not found:', err));
  });
}
